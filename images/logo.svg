<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none">
  <!-- Arch icon mark -->
  <g transform="translate(260,155)">
    <!-- Left pillar -->
    <rect x="-78" y="-8" width="16" height="72" fill="white" rx="3"/>
    <!-- Right pillar -->
    <rect x="62" y="-8" width="16" height="72" fill="white" rx="3"/>
    <!-- Arch ring: outer -->
    <path d="M-78,-8 A78,78 0 0,1 78,-8" stroke="white" stroke-width="16" fill="none" stroke-linecap="square"/>
    <!-- Arch ring: inner cutout (creates ring effect) -->
    <path d="M-62,-8 A62,62 0 0,1 62,-8" stroke="#0A0A0A" stroke-width="1" fill="none"/>
    <!-- Keystone (orange wedge at arch crown) -->
    <polygon points="0,-94 -20,-64 20,-64" fill="#E8671A"/>
    <!-- Keystone shadow line -->
    <line x1="0" y1="-94" x2="0" y2="-64" stroke="rgba(0,0,0,0.3)" stroke-width="1.5"/>
    <!-- Subtle base line -->
    <line x1="-90" y1="64" x2="90" y2="64" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <text x="260" y="252"
        text-anchor="middle"
        font-family="'Arial Black','Arial Bold',Arial,sans-serif"
        font-weight="900"
        font-size="40"
        fill="white"
        letter-spacing="3">KEYSTONE SOUTH</text>

  <!-- Decorative flanking lines -->
  <line x1="46"  y1="269" x2="162" y2="269" stroke="#E8671A" stroke-width="1.5" opacity="0.55"/>
  <line x1="358" y1="269" x2="474" y2="269" stroke="#E8671A" stroke-width="1.5" opacity="0.55"/>

  <!-- Sub-wordmark -->
  <text x="260" y="289"
        text-anchor="middle"
        font-family="Arial,sans-serif"
        font-weight="500"
        font-size="15"
        fill="#E8671A"
        letter-spacing="13">CONSTRUCTION</text>
</svg>
